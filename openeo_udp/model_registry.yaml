active_model:
  name: round3_r101_focal_dice_zscore_round3_v2
  experiment: exp_round3_r101_dropout02
  weights_url: https://github.com/ray-climate/solar_openEO/releases/download/v2.0.0/best.weights.h5
  band_stats_url: https://github.com/ray-climate/solar_openEO/releases/download/v2.0.0/band_stats.npz
  weights_local: experiments/exp_round3_r101_dropout02/best.weights.h5
  band_stats_local: outputs/training_prep/final_v2/band_stats.npz
  backbone: resnet101
  decoder_filters:
  - 256
  - 128
  - 96
  - 64
  - 32
  decoder_dropout: 0.2
  attention: false
  se: false
  input_shape:
  - 256
  - 256
  - 13
  bands:
  - B1
  - B2
  - B3
  - B4
  - B5
  - B6
  - B7
  - B8
  - B8A
  - B9
  - B10
  - B11
  - B12
  normalization: zscore
  # Production threshold: combined-Dice plateau peak on the full test set under
  # PLAIN inference. Kept on the recall-leaning side of the flat plateau because a
  # second-stage temporal FP filter (v2.1) will handle false positives downstream,
  # while stage-1 false negatives (missed sites) are unrecoverable. Per-slice sweeps
  # in experiments/crosseval/; full-test sweep in
  # experiments/exp_round3_r101_dropout02/evaluation_test/threshold_sweep_test.csv.
  threshold: 0.60
  version: 2.0.0
  released: '2026-05-23'
  # Metrics below are PLAIN inference (no TTA) on the full 6,729-chip v2 test split
  # at threshold 0.60 — i.e. what the UDF actually serves. (Earlier 0.8697 / 0.7695
  # were TTA hard-slice-only and did not match the served path.)
  # Object-level: 96% detection of real sites (median per-site Dice 0.936);
  # 94.5% clean rejection of look-alikes. Known limit: sub-~5-acre sites are below
  # Sentinel-2's 10 m resolution floor (tiny <50px ~0% detected).
  test_dice: 0.899
  test_iou: 0.8165
  test_precision: 0.909
  test_recall: 0.889
  training_chips: 26940
  training_loss: focal_dice
